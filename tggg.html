<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Messenger</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#17212b;
    color:white;
}

header{
    background:#2b5278;
    padding:15px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

#chat{
    height:75vh;
    overflow-y:auto;
    padding:10px;
}

.message{
    background:#2b5278;
    padding:10px;
    margin:8px 0;
    border-radius:10px;
}

.name{
    font-weight:bold;
    color:#8ec7ff;
}

.bottom{
    display:flex;
    padding:10px;
    gap:10px;
}

input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
}

button{
    background:#2b5278;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>Mini Messenger</header>

<div id="chat"></div>

<div class="bottom">
    <input id="messageInput" placeholder="Введите сообщение...">
    <button onclick="sendMessage()">Отправить</button>
</div>

<script>

let username = localStorage.getItem("username");

if(!username){
    username = prompt("Введите ваш ник:");
    localStorage.setItem("username", username);
}

let messages = JSON.parse(localStorage.getItem("messages")) || [];

function renderMessages(){
    const chat = document.getElementById("chat");
    chat.innerHTML = "";

    messages.forEach(msg=>{
        chat.innerHTML += `
        <div class="message">
            <div class="name">${msg.user}</div>
            <div>${msg.text}</div>
        </div>`;
    });

    chat.scrollTop = chat.scrollHeight;
}

function sendMessage(){
    const input = document.getElementById("messageInput");

    if(input.value.trim() === "") return;

    messages.push({
        user: username,
        text: input.value
    });

    localStorage.setItem("messages", JSON.stringify(messages));

    input.value = "";
    renderMessages();
}

renderMessages();

setInterval(()=>{
    messages = JSON.parse(localStorage.getItem("messages")) || [];
    renderMessages();
},1000);

</script>

</body>
</html>
